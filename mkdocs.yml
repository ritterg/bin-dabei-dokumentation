site_name: bin-dabei.ch – Hilfe und Handbuch
site_url: https://hilfe.bin-dabei.ch
repo_name: 'bin-dabei-dokumentation'
site_author: 'Gerold Ritter'
theme:
  name: material
  language: de
  logo: /img/bin-dabei-logo.png
  favicon: /img/favicon.ico
  font:
    text: Source Sans Pro
    code: Open Mono
  features:
    - search.suggest
    - search.highlight
    - search.share
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.inlinehilite
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Was gibt es Neues?: changelog.md
  - Für Benutzer:innen: 
    - Übersicht: user/index.md
    - Anmelden mit Passkey: user/passkeys.md
    - Einschreiben für Anlässe: user/einschreiben.md
    - Probenplan als PDF: user/probenplan.md
    - Probenplan als Kalender-Abo: user/kalenderabo.md
    - Email an alle: user/email.md
    - Anlassinformationen: user/anlassinformationen.md
    - Noten: user/noten.md
  - Für Admins: 
    - Übersicht: admin/index.md
    - Anlassinformationen: admin/anlassinformationen.md
    - Benutzer:innen: admin/benutzer.md
    - Anlässe: admin/anlaesse.md
    - Verein: admin/verein.md
    - Register & Instrumente: admin/register-instrumente.md
    - Gruppen: admin/gruppen.md
    - Import: admin/import.md
    - Export: admin/export.md
  - Notenverwaltung:
    - Übersicht: noten/index.md
    - Einrichten: noten/einrichten.md
    - Stimmen bereitstellen: noten/bereitstellen.md
    - Stimmenaufteilung: noten/stimmenaufteilung.md
    - Stücke & Kategorien: noten/stuecke.md
    - Stimmen zuteilen: noten/stimmen-zuteilen.md
    - Stimmen kopieren: noten/stimmen-kopieren.md